name: Deploy Staging Web

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "artifacts/mahalle/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web artifacts
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}
          EXPO_PUBLIC_SOCKET_URL: ${{ secrets.STAGING_API_URL }}
        run: pnpm --filter @workspace/mahalle run build:web

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --yes --token "${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
