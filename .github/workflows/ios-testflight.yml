name: iOS TestFlight

on:
  workflow_dispatch:

jobs:
  build-and-submit:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: artifacts/mahalle
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS app
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.PROD_API_URL }}
          EXPO_PUBLIC_SOCKET_URL: ${{ secrets.PROD_API_URL }}
        run: eas build --platform ios --profile production --non-interactive --auto-submit
